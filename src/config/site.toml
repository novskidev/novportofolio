[config.site]
title = "Novskidev"
description = "Personal portfolio and writing space of Novian Nadari."
pageTitle = "Novskidev | Portfolio of Novian Nadari"
pageDescription = "Portfolio, projects, notes, and digital presence of Novian Nadari."
repository = "https://github.com/novskidev"
footerNote = "Built and maintained by Novian Nadari not AI."

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.comments]
enabled = false
provider = "none"
show_on_posts = false

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "en"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "en"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "Novian Nadari"
handle = "@Novskidev"
role = "Educator & Software Engineer"
company = "Novskidev"
location = "Remote"
email = "novskidev@gmail.com"
website = "https://novski.dev/"
github = "https://github.com/novskidev"
meta = "Personal portfolio"
avatar = "/images/Novskidev.png"

[[config.topNav.links]]
label = "About"
href = "/about"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

[[config.topNav.links]]
label = "Project"
href = "/projects"

[[config.topNav.links]]
label = "Vibe"
href = "/vibe"

[config.home]
layout = "grid"

[config.home.quote]
text = [
  "A space for my projects, ideas, notes,",
  "and everything I want to put out into the world.",
]
image = "/images/logo-with-name.png"

[config.home.intro]
title = "I'm Novian 👋"
name = "Novian 👋"
body = [
  "This site collects my projects, notes, experiments, and professional profile in one place.",
  "The goal is simple: make my work easy to find, easy to read, and easy to grow over time.",
]
image = "/images/logo-cat.png"

[config.home.latest]
count = 1
heatmapWeeks = 24
showHeatmapLatest = true
excludeDraft = true
startDate = ""
dateArchiveBaseHref = ""

[[config.home.navigation]]
icon = "briefcase"
title = "About"
subtitle = "Profile, contact, and background"
href = "/about"

[[config.home.navigation]]
icon = "pen"
title = "Blog"
subtitle = "Essays, notes, and field reports"
href = "/blog"

[[config.home.navigation]]
icon = "compass"
title = "Project"
subtitle = "Selected work and project notes"
href = "/projects"

[[config.home.navigation]]
icon = "sparkle"
title = "Vibe"
subtitle = "Short updates and digital fragments"
href = "/vibe"

[[config.home.connect]]
label = "GitHub"
href = "https://github.com/novskidev"
icon = "github"

[[config.home.connect]]
label = "Website"
href = "https://novski.dev/"
